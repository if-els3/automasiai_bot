version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_threat_alert
    restart: unless-stopped
    
    # Timezone Configuration
    environment:
      - TZ=Asia/Jakarta
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - EXECUTION_PROCESS=main
      
    # Volume Persistence
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows
      - ./credentials:/home/node/.n8n/credentials
    
    # Port Mapping
    ports:
      - "5678:5678"
    
    # Network Configuration
    networks:
      - n8n_network
    
    # Resource Limits (optional)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  n8n_data:
    driver: local

networks:
  n8n_network:
    driver: bridge
